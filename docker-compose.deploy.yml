services:
  postgres:
    image: postgres:16
    container_name: cloudsight-postgres-prod
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudsight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cloudsight}

    volumes:
      - cloudsight_postgres_prod_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudsight_user} -d ${POSTGRES_DB:-cloudsight}"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - cloudsight-network

    security_opt:
      - no-new-privileges:true

  server:
    image: ghcr.io/nathanlouissaint/cloudsight-server:${IMAGE_TAG:-latest}
    container_name: cloudsight-server-prod

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}

    expose:
      - "5001"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - cloudsight-network

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

  client:
    image: ghcr.io/nathanlouissaint/cloudsight-client:${IMAGE_TAG:-latest}
    container_name: cloudsight-client-prod

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      server:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - cloudsight-network

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

volumes:
  cloudsight_postgres_prod_data:

networks:
  cloudsight-network:
    driver: bridge
