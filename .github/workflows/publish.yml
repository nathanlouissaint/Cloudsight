name: CloudSight Publish Images

on:
  workflow_run:
    workflows:
      - CloudSight Verification
      - CloudSight Docker
      - CloudSight Smoke Tests
    types:
      - completed

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    name: Publish Production Images

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata (Server)
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nathanlouissaint/cloudsight-server
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha

      - name: Docker Metadata (Client)
        id: client-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nathanlouissaint/cloudsight-client
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha

      - name: Build and Push Server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.client-meta.outputs.tags }}
          labels: ${{ steps.client-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
